<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Panda Login Form</title>
    <link rel='stylesheet' href='https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&amp;display=swap'>
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <div class="container">
        <form>
            <h2 id="form-title">Login</h2>
            <label for="username">Enter your username</label>
            <input type="text" id="username" placeholder="Username" required />

            <div class="signup-only">
                <label for="email">Enter your email</label>
                <input type="email" id="email" placeholder="Email" />
            </div>

            <label for="password">Enter your password</label>
            <input type="password" id="password" placeholder="Password" required />

            <div class="signup-only">
                <label for="confirm-password">Confirm your password</label>
                <input type="password" id="confirm-password" placeholder="Confirm Password" />
            </div>

            <button id="submit-btn">Login</button>
            <p class="toggle-text" id="toggle-text">Don't have an account? <a href="#" id="toggle-link">Sign Up</a></p>
        </form>
        <div class="ear-l"></div>
        <div class="ear-r"></div>
        <div class="panda-face">
            <div class="blush-l"></div>
            <div class="blush-r"></div>
            <div class="eye-l">
                <div class="eyeball-l"></div>
            </div>
            <div class="eye-r">
                <div class="eyeball-r"></div>
            </div>
            <div class="nose"></div>
            <div class="mouth"></div>
        </div>
        <div class="hand-l"></div>
        <div class="hand-r"></div>
        <div class="paw-l"></div>
        <div class="paw-r"></div>
    </div>
    <!-- partial -->
    <script src="script.js"></script>

</body>

</html>
